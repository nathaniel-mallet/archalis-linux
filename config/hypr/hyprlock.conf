background {
    monitor =
    color = rgba(0, 0, 0, 1)
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    outer_color = rgb(255, 255, 255)
    inner_color = rgb(0, 0, 0)
    font_color = rgb(255, 255, 255)
    placeholder_text = <i>Password...</i>
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$TIME"
    font_size = 48
    position = 0, 100
    halign = center
    valign = center
}
